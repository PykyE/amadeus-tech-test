syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.amadeus";
option java_outer_classname = "ProductGrpcProto";

package hello;

service ProductService {
    rpc CreateProduct(CreateProductRequest) returns (ProductResponse);
    rpc GetProduct(ProductId) returns (ProductResponse);
    rpc GetAllProducts(EmptyRequest) returns (ProductListResponse);
    rpc UpdateProduct(UpdateProductRequest) returns (ProductResponse);
    rpc DeleteProduct(ProductId) returns (EmptyResponse);
}

message EmptyRequest {}

message ProductId {
    string id = 1;
}

message CreateProductRequest {
    string name = 1;
    double price = 3;
    string description = 4;
    int64 quantity = 5;
    string tags = 7;
}

message UpdateProductRequest {
    string id = 1;
    string name = 2;
    double price = 3;
    string description = 4;
    int64 quantity = 5;
    string tags = 7;
    bool active = 8;
}

message ProductResponse {
    string id = 1;
    string name = 2;
    double price = 3;
    string description = 4;
    int64 quantity = 5;
    string creationDate = 6;
    string tags = 7;
    bool active = 8;
}

message ProductListResponse {
    repeated ProductResponse products = 1;
}

message EmptyResponse {}
