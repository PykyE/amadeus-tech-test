quarkus:
  grpc:
    server:
      port: 9000
    clients:
      product-service:
        host: localhost
        port: 9000
        plain-text: true
  datasource:
    db-kind: h2
    username: admin
    password: password
    jdbc:
      url: jdbc:h2:mem:test
      driver: org.h2.Driver
      max-size: 16
  swagger-ui:
    path: /swagger-ui
  http:
    root-path: /amadeus/api/v1
  smallrye-openapi:
    path: /swagger
  hibernate-orm:
    schema-management:
      strategy: drop-and-create
